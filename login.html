<meta charset="UTF-8">

<title>PBES Analytics Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(135deg,#1d4ed8,#4f46e5);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.login-box{

width:420px;

background:white;

padding:40px;

border-radius:18px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}

.logo{

text-align:center;

margin-bottom:25px;

}

.logo img{

width:80px;

margin-bottom:10px;

}

h2{

text-align:center;

margin-bottom:5px;

color:#1e3a8a;

}

p{

text-align:center;

margin-bottom:25px;

color:#666;

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

border-radius:8px;

border:1px solid #ccc;

font-size:15px;

}

button{

width:100%;

padding:14px;

background:#2563eb;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

#error{

margin-top:15px;

text-align:center;

color:red;

font-weight:600;

}

</style>
