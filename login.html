<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PBES Analytics Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(135deg,#1d4ed8,#4f46e5);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.login-box{

width:420px;

background:white;

padding:40px;

border-radius:18px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}

.logo{

text-align:center;

margin-bottom:25px;

}

.logo img{

width:80px;

margin-bottom:10px;

}

h2{

text-align:center;

margin-bottom:5px;

color:#1e3a8a;

}

p{

text-align:center;

margin-bottom:25px;

color:#666;

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

border-radius:8px;

border:1px solid #ccc;

font-size:15px;

}

button{

width:100%;

padding:14px;

background:#2563eb;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

#error{

margin-top:15px;

text-align:center;

color:red;

font-weight:600;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Emblem_of_India.svg/1200px-Emblem_of_India.svg.png">

</div>

<h2>PBES School Analytics</h2>

<p>Official Login Portal</p>

<input
type="email"
id="email"
placeholder="Official Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">

Login

</button>

<div id="error"></div>

<button onclick="login()">Login</button>
<div id="error"></div>
<p style="text-align:right;margin-top:10px;">
  <a href="#" onclick="showForgotPassword();return false;" style="color:#2563eb;font-size:13px;text-decoration:none;">Forgot Password?</a>
</p>

<!-- Forgot-password mini form, hidden until the link above is clicked -->
<div id="forgot-box" style="display:none;margin-top:15px;padding-top:15px;border-top:1px solid #eee;">
  <p style="text-align:center;margin-bottom:15px;font-size:13px;color:#666;">
    Enter your email — we'll send a reset link.
  </p>
  <input type="email" id="forgot-email" placeholder="Official Email">
  <button onclick="sendPasswordReset()">Send Reset Link</button>
  <div id="forgot-msg" style="margin-top:12px;text-align:center;font-size:13px;font-weight:600;"></div>
  <p style="text-align:center;margin-top:10px;">
    <a href="#" onclick="hideForgotPassword();return false;" style="color:#666;font-size:12.5px;">← Back to Login</a>
  </p>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script src="auth.js"></script>

</body>

</html>
