<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — PBES Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:linear-gradient(135deg,#1d4ed8,#4f46e5);height:100vh;display:flex;justify-content:center;align-items:center;}
.box{width:420px;background:white;padding:40px;border-radius:18px;box-shadow:0 20px 40px rgba(0,0,0,.25);}
h2{text-align:center;margin-bottom:5px;color:#1e3a8a;}
p{text-align:center;margin-bottom:25px;color:#666;}
input{width:100%;padding:14px;margin-bottom:15px;border-radius:8px;border:1px solid #ccc;font-size:15px;}
button{width:100%;padding:14px;background:#2563eb;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
button:hover{background:#1d4ed8;}
#msg{margin-top:15px;text-align:center;font-weight:600;}
</style>
</head>
<body>
<div class="box">
  <h2>Set New Password</h2>
  <p>Choose a new password for your account</p>
  <input type="password" id="newpass" placeholder="New Password (min 6 characters)">
  <input type="password" id="confirmpass" placeholder="Confirm New Password">
  <button onclick="doReset()">Update Password</button>
  <div id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
// Supabase puts the recovery token in the URL hash and auto-establishes
// a temporary session when this page loads, via detectSessionInUrl (on by default).

async function doReset() {
  const p1 = document.getElementById('newpass').value;
  const p2 = document.getElementById('confirmpass').value;
  const msg = document.getElementById('msg');

  if (p1.length < 6) { msg.style.color='red'; msg.innerHTML='Password must be at least 6 characters'; return; }
  if (p1 !== p2) { msg.style.color='red'; msg.innerHTML='Passwords do not match'; return; }

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    msg.style.color='red';
    msg.innerHTML='Reset link expired or invalid. Please request a new one from the login page.';
    return;
  }

  const { error } = await sb.auth.updateUser({ password: p1 });
  if (error) { msg.style.color='red'; msg.innerHTML=error.message; return; }

  msg.style.color='#059669';
  msg.innerHTML='✓ Password updated! Redirecting to login...';
  await sb.auth.signOut();
  setTimeout(() => window.location.href = 'login.html', 2000);
}
</script>
</body>
</html>
